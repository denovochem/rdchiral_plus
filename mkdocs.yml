site_name: rdchiral_mypyc
site_description: 
repo_url: https://github.com/denovochem/rdchiral_mypyc
repo_name: denovochem/rdchiral_mypyc

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Quick Start: index.md
  - API Reference: reference.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - codehilite

extra_css:
  - stylesheets/extra.css