name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy types-requests rdkit
          python -m pip uninstall -y rdkit-stubs || true
      - name: Ruff format check
        run: ruff format --check rdchiral
      - name: Ruff lint
        run: ruff check rdchiral
      - name: Type check with mypy
        run: mypy rdchiral
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        rdkit-version:
          - "2025.9.6"
          - "2024.9.6"
          - "2023.9.6"
          - "2022.9.5"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "rdkit==${{ matrix.rdkit-version }}"
          python -m pip install .
          python -m pip install pytest

      - name: Run tests
        run: pytest -v
